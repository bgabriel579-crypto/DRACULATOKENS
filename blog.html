<html>
<head>
    <title>Forum</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .comment { margin: 10px 0; padding: 5px; border: 1px solid #ccc; }
        .category { font-weight: bold; }
        .search { margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Forum</h1>
    <div class="search">
        <input type="text" id="search" placeholder="Search..." />
        <button onclick="searchComments()">Search</button>
    </div>
    <div id="comments"></div>
    <script>
        const comments = [];

        function displayComments() {
            const commentsDiv = document.getElementById('comments');
            commentsDiv.innerHTML = '';
            comments.forEach((comment, index) => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment';
                commentDiv.innerHTML = `<div class='category'>${comment.category}</div><div>${comment.text}</div><button onclick='moderateComment(${index})'>Moderate</button>`;
                commentsDiv.appendChild(commentDiv);
            });
        }

        function addComment(category, text) {
            comments.push({ category, text });
            displayComments();
        }

        function searchComments() {
            const query = document.getElementById('search').value.toLowerCase();
            const filteredComments = comments.filter(comment => comment.text.toLowerCase().includes(query));
            const commentsDiv = document.getElementById('comments');
            commentsDiv.innerHTML = '';
            filteredComments.forEach((comment, index) => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment';
                commentDiv.innerHTML = `<div class='category'>${comment.category}</div><div>${comment.text}</div><button onclick='moderateComment(${index})'>Moderate</button>`;
                commentsDiv.appendChild(commentDiv);
            });
        }

        function moderateComment(index) {
            comments.splice(index, 1);
            displayComments();
        }
    </script>
</body>
</html>
